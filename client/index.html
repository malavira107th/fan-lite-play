<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Fan Lite Play — Free Cricket Strategy &amp; Team Building Platform</title>
    <!-- Inter font: self-hosted variable font (no Google Fonts dependency) -->
    <link rel="preload" href="/fonts/inter-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Playfair Display: self-hosted variable font (no Google Fonts dependency) -->
    <link rel="preload" href="/fonts/playfair-display-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Preload the logo for faster LCP -->
    <link rel="preload" href="/logo.webp" as="image" type="image/webp" />
    <!-- Critical CSS: above-the-fold styles inlined to eliminate render-blocking -->
    <style>
      *,::before,::after{box-sizing:border-box;margin:0;padding:0}
      html{font-family:'Inter',system-ui,sans-serif;-webkit-text-size-adjust:100%;line-height:1.5}
      body{background:#0a0f0a;color:#f0f4f0;min-height:100vh}
      #root{min-height:100vh}
      @font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;src:url('/fonts/inter-latin-wght-normal.woff2') format('woff2')}
      @font-face{font-family:'Playfair Display';font-style:normal;font-weight:400 900;font-display:swap;src:url('/fonts/playfair-display-latin-wght-normal.woff2') format('woff2')}
    </style>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="canonical" href="https://www.fanliteplay.com/" />

    <!-- Primary SEO Meta Tags -->
    <meta name="description" content="Fan Lite Play is a free cricket strategy and team-building platform. Select 11 players, apply your cricket knowledge, and compete on skill-based leaderboards. No real money. 18+ only." />
    <meta name="keywords" content="cricket strategy game, cricket team builder, free cricket platform, cricket knowledge game, cricket leaderboard, cricket XI builder, cricket challenge, skill based cricket" />
    <meta name="author" content="Fan Lite Play" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#0d1f14" />
    <meta name="rating" content="general" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.fanliteplay.com/" />
    <meta property="og:site_name" content="Fan Lite Play" />
    <meta property="og:title" content="Fan Lite Play — Free Cricket Strategy &amp; Team Building Platform" />
    <meta property="og:description" content="Build your dream XI from real match squads, join free skill-based challenges, and prove your cricket knowledge on the leaderboard. Free to play. 18+ only." />
    <meta property="og:image" content="https://www.fanliteplay.com/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@fanliteplay" />
    <meta name="twitter:title" content="Fan Lite Play — Free Cricket Strategy Platform" />
    <meta name="twitter:description" content="Select 11 players, apply your cricket knowledge, and compete on skill-based leaderboards. Free to play. 18+ only." />
    <meta name="twitter:image" content="https://www.fanliteplay.com/logo.png" />

    <!-- Geo / Local SEO -->
    <meta name="geo.region" content="IN-DL" />
    <meta name="geo.placename" content="New Delhi, India" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Fan Lite Play",
      "url": "https://www.fanliteplay.com",
      "logo": "https://www.fanliteplay.com/logo.png",
      "description": "Fan Lite Play is a free cricket strategy and team-building platform where users select 11 players from real match squads and compete on skill-based leaderboards.",
      "email": "support@fanliteplay.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "F-73, DLF Promenade Mall, Nelson Mandela Marg",
        "addressLocality": "Vasant Kunj, New Delhi",
        "addressRegion": "Delhi",
        "postalCode": "110070",
        "addressCountry": "IN"
      },
      "sameAs": [
        "https://www.fanliteplay.com",
        "https://fan-lite-play.vercel.app"
      ]
    }
    </script>

    <!-- WebSite Schema for Sitelinks Search Box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Fan Lite Play",
      "url": "https://www.fanliteplay.com",
      "description": "Free cricket strategy and team-building platform. Skill-based. 18+ only.",
      "inLanguage": "en-IN"
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics: only injected when env vars are properly set at build time -->
    <script>
      (function() {
        var ep = '%VITE_ANALYTICS_ENDPOINT%';
        var wid = '%VITE_ANALYTICS_WEBSITE_ID%';
        if (!ep || ep.indexOf('%VITE_') === 0 || !wid || wid.indexOf('%VITE_') === 0) return;
        var s = document.createElement('script');
        s.defer = true;
        s.src = ep + '/umami';
        s.setAttribute('data-website-id', wid);
        document.head.appendChild(s);
      })();
    </script>
  </body>

</html>
